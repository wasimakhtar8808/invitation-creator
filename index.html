<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Design gorgeous digital invitations and track RSVPs in real-time. Single Page Application built with clean architecture.">
  <link rel="stylesheet" href="./styles.css">
  <title>Digital Invitation Creator & RSVP Manager</title>
</head>
<body>
  <!-- Main Single Page Application Container -->
  <div id="app" class="min-h-screen">
    <!-- Rendered content will inject here -->
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center space-y-4">
        <div class="animate-bounce text-4xl">✉️</div>
        <p class="text-slate-500 font-semibold">Loading invitation application...</p>
      </div>
    </div>
  </div>

  <!-- Bootstrapper entrypoint -->
  <script type="module" src="./app.js"></script>
  <!-- Test runner (runs when ?test=true is present) -->
  <script type="module" src="./tests.js"></script>
</body>
</html>
